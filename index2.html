<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Delectus omnis architecto explicabo. Porro ipsum nobis nulla doloribus quibusdam odio, laborum laudantium perspiciatis dignissimos commodi magnam omnis aperiam. Distinctio, magni ducimus?</p>
    <input type="text", placeholder="name">
    <h3 id="device">Select the device</h3>
    <select>
        <option selected disabled>Choose the device</option>
        <option value="samsung">Samsung</option>
        <option value="apple">Apple</option>
        <option value="micromax">Micromax</option>
        <option value="iqoo">Iqoo</option>
    </select>
    <button id="orange">orange</button>
    <button id="green">green</button>
    <script>
        function clickhandler(color){
            return function(){
                document.body.style.backgroundColor=`${color}`
            }
        }
        document.getElementById('orange').onclick=clickhandler("orange")
        document.getElementById('green').onclick=clickhandler("green")
    </script>
    <script src="script2.js"></script>
</body>
</html>
